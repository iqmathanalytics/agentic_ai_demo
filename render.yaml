services:
  - type: web
    name: iq-math-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: https://iq-math-technologies.vercel.app,http://localhost:5173,http://127.0.0.1:5173,https://iq-math-frontend.onrender.com
      - key: ALPHA_VANTAGE_KEY
        value: QHFN2F26OZ9SV2IX
      - key: FINNHUB_KEY
        value: d8ki25pr01qjgd7050igd8ki25pr01qjgd7050j0
    healthCheckPath: /health

  - type: web
    name: iq-math-frontend
    env: static
    rootDir: iq-math-technologies-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_AGENT_API_URL
        fromService:
          type: web
          name: iq-math-backend
          envVarKey: RENDER_EXTERNAL_URL